<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Private</title>
<style>
:root{color-scheme:light dark}*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FBF9F5;color:#2B2724}
@media(prefers-color-scheme:dark){body{background:#191713;color:#F2EDE5}}
.lock{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px}
.card{width:100%;max-width:380px;text-align:center;background:#fff;border:1px solid #EBE4DA;border-radius:22px;padding:34px 26px;box-shadow:0 14px 44px -16px rgba(43,39,36,.28)}
@media(prefers-color-scheme:dark){.card{background:#232019;border-color:#332F27}}
.ic{width:54px;height:54px;border-radius:16px;margin:0 auto 16px;display:grid;place-items:center;background:#F1ECE3;font-size:24px}
@media(prefers-color-scheme:dark){.ic{background:#2A251C}}
h1{font-size:19px;margin:0 0 6px;letter-spacing:-.01em}
p{font-size:14px;line-height:1.5;margin:0 0 18px;opacity:.75}
input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #DED5C8;background:#F6F2EB;font-size:16px;text-align:center;color:inherit}
@media(prefers-color-scheme:dark){input{background:#1E1B15;border-color:#403A31}}
input:focus{outline:2px solid #8A6D3B;outline-offset:1px}
button{width:100%;margin-top:12px;padding:12px;border:none;border-radius:12px;background:#8A6D3B;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
button:disabled{opacity:.6}
.err{color:#c0524f;font-size:13px;margin-top:12px;min-height:18px}
</style></head>
<body>
<div class="lock"><form class="card" id="f">
<div class="ic">🔒</div>
<h1>Private page</h1>
<p>Enter the passphrase to view.</p>
<input id="p" type="password" autocomplete="current-password" placeholder="Passphrase" autofocus>
<button type="submit" id="b">Unlock</button>
<div class="err" id="e"></div>
</form></div>

function b64d(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function decrypt(pass){
  var salt=b64d(SALT),iv=b64d(IV),data=b64d(PAYLOAD);
  var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,data);
  return new TextDecoder().decode(buf);
}
function reveal(html){document.open();document.write(html);document.close();}
async function attempt(pass,remember){
  try{
    var html=await decrypt(pass);
    if(remember){try{localStorage.setItem("fcm_pass",pass);}catch(e){}}
    reveal(html); return true;
  }catch(e){ return false; }
}
(async function(){
  var cached=null; try{cached=localStorage.getItem("fcm_pass");}catch(e){}
  if(cached){ if(await attempt(cached,false)) return; try{localStorage.removeItem("fcm_pass");}catch(e){} }
  var f=document.getElementById("f"),p=document.getElementById("p"),b=document.getElementById("b"),er=document.getElementById("e");
  f.addEventListener("submit",async function(ev){
    ev.preventDefault(); er.textContent=""; b.disabled=true; b.textContent="Unlocking…";
    var ok=await attempt(p.value,true);
    if(!ok){ er.textContent="That passphrase doesn't match. Try again."; b.disabled=false; b.textContent="Unlock"; p.select(); }
  });
})();
